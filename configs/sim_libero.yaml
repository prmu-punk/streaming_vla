# @package _global_

defaults:
  - train
  - override /task: libero_uncond_2cam224_1e-4
  - _self_

ckpt: null
gpu_id: 0

model:
  load_text_encoder: true
  skip_dit_load_from_pretrain: true
  action_dit_pretrained_path: null

EVALUATION:
  task_suite_name: libero_spatial
  task_id: 0
  num_trials: 1
  trial_start_idx: 0
  trials_per_process: 1
  output_dir: ./evaluate_results/libero/${hydra:runtime.choices.task}/${now:%Y%m%d_%H%M%S}

  # Runtime behavior
  env_num: 1
  num_steps_wait: 30
  replan_steps: 10
  binarize_gripper: true
  use_action_ensembler: false
  visualize_future_video: false
  async_obs_stride_env_steps: ${STREAMING.obs_stride}
  async_control_dt_ms: ${STREAMING.control_dt_ms}
  no_realtime_pacing: false

  # Action inference
  action_horizon: 13
  num_inference_steps: 10
  sigma_shift: null
  text_cfg_scale: 1.0
  negative_prompt: ""
  rand_device: cuda
  tiled: false
  profile_runtime: false
  save_full_runtime_trace: false
  save_video: false
  continue_on_task_failure: false
  schedule_output_path: ./data/trajectory_replay/libero_async_schedule/schedule.pt
  schedule_shard_id: 0
  schedule_num_shards: 1
  collect_all_tasks: true
  collect_task_ids: null
  collect_task_suite_names:
    - libero_10
    - libero_goal
    - libero_spatial
    - libero_object
  collect_num_trials_per_task: 5
  collect_mode_prob_threshold: 0.0
  collect_output_file: null

  # Optional external inputs
  dataset_stats_path: null
  device: cuda:0

MULTIRUN:
  create_only: false
  task_file: null
  task_suite_names:
    - libero_10
    - libero_goal
    - libero_spatial
    - libero_object
  num_gpus: 8
  max_tasks_per_gpu: 2
hydra:
  job:
    chdir: false
  run:
    dir: .
  output_subdir: null


