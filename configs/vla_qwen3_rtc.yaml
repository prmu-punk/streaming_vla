# RTC-flow VLM 条件编码配置（与旧 OAT/token 路径解耦）
# RynnBrain-2B 本地路径（运行 scripts/download_rynnbrain2b.py 下载后替换此处）
# 下载完成后将下方路径改为: /home/luye/data/Streaming_VLA/models/RynnBrain-2B
model_name_or_path: /data/luye/Streaming_VLA/models/RynnBrain-2B
# 必须与训练主配置的 model.state_dim 一致
state_dim: 16
# null: 自动选择 cuda/cpu；可显式设为 "cuda" 或 "cpu"
device: null

stream:
  # 状态写入最小间隔（秒）；0.0 表示不做时间门控
  state_interval_s: 0.0
  # 视觉写入最小间隔（秒）；0.0 表示不做时间门控
  vision_interval_s: 0.0
  # 流式上下文上限，超出后触发 step 级淘汰
  max_context_len: 1e4
