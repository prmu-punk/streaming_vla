# @package _global_

defaults:
  - /data: libero_2cam
  - /model: fastwam_streaming
  - _self_

mixed_precision: "bf16"
seed: 42
device: cuda
output_path: ./runs/profile/fastwam_async_action_throughput.json
checkpoint_path: null

benchmark:
  sample_index: 0
  warmup_env_steps: 30
  total_env_steps: 200
  control_dt_ms: 50.0
  obs_stride_env_steps: 3
  action_trigger_every_n_obs: 3
  action_horizon: 32
  replan_steps: 10
  num_inference_steps: 10
  sigma_shift: null
  rand_device: cuda
  tiled: false
  seed: 42
  video_layers_per_chunk: 2

hydra:
  job:
    chdir: false
  run:
    dir: .
  output_subdir: null
