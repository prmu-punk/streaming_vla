# @package _global_

defaults:
  - override /data: libero_2cam
  - override /model: fastwam
  - _self_

# Single-card H200 140G aggressive setting.
# Keep semantics identical to the default uncond run; only raise throughput knobs.
batch_size: 24
num_workers: 16

model:
  mot_checkpoint_mixed_attn: false
  action_train_tokenwise_random_t: true

# scheduler
lr_scheduler_type: "cosine"
learning_rate: 1e-4
num_epochs: 10
max_steps: null
log_every: 10
save_every: 2000
eval_every: 200

# training
gradient_accumulation_steps: 1
weight_decay: 1e-2
resume: /inspire/qb-ilm/project/robot-reasoning/xiangyushun-p-xiangyushun/luye/FastWAM/runs/libero_uncond_2cam224_1e-4_h200_140g/2026-05-19_05-10-30/checkpoints/state/step_034000
