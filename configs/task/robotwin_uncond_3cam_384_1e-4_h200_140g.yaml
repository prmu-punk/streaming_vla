# @package _global_

defaults:
  - override /data: robotwin
  - override /model: fastwam
  - _self_

# Single-card H200 140G aggressive setting.
# RoboTwin 3x384 is much heavier than LIBERO 2x224, so keep this lower.
batch_size: 32
num_workers: 16

model:
  mot_checkpoint_mixed_attn: false
  action_train_tokenwise_random_t: true

# scheduler
lr_scheduler_type: "cosine"
learning_rate: 1e-4
num_epochs: 5
max_steps: null
log_every: 10
save_every: 2500
eval_every: 500

# training
gradient_accumulation_steps: 1
weight_decay: 1e-2
resume: null
