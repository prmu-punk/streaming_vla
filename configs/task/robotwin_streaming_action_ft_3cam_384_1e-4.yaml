# @package _global_

defaults:
  - override /data: robotwin_streaming_episode_3cam
  - override /model: fastwam_streaming
  - _self_

batch_size: 96
num_workers: 8
dataloader_disable_shared_memory: false
dataloader_pin_memory: false
dataloader_persistent_workers: true
dataloader_prefetch_factor: 2

model:
  mot_checkpoint_mixed_attn: false
  streaming:
    freeze_video_expert: true
    obs_stride: ${STREAMING.obs_stride}
    streaming_train:
      enabled: true
      cache_mode: full_cur
      token_noise_pattern: front_low_high

lr_scheduler_type: "cosine"
learning_rate: 1e-4
num_epochs: 5
max_steps: null
log_every: 10
save_every: 1000
eval_every: 1000

gradient_accumulation_steps: 4
weight_decay: 1e-2
resume: null

profile_bootstrap:
  target_obs_period_ms: 100.0
  action_trigger_every_n_obs: 2
  expected_video_prefill_ms: null
  expected_action_full_ms: null
  expected_action_step_ms: null
