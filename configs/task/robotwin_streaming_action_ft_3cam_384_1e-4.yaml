# @package _global_

defaults:
  - override /data: robotwin_streaming_episode_3cam
  - override /model: fastwam_streaming
  - _self_

batch_size: 96
num_workers: 8
dataloader_disable_shared_memory: false
dataloader_pin_memory: true
dataloader_persistent_workers: true
dataloader_prefetch_factor: 2

model:
  mot_checkpoint_mixed_attn: false
  streaming:
    freeze_video_expert: true
    obs_stride: ${STREAMING.obs_stride}
    streaming_train:
      enabled: true
      cache_mode: full_cur
      token_noise_pattern: random_all

lr_scheduler_type: "cosine"
learning_rate: 5e-5
num_epochs: 5
max_steps: null
log_every: 10
save_every: 250
eval_every: 250

gradient_accumulation_steps: 1
weight_decay: 1e-2
resume: /inspire/qb-ilm/project/robot-reasoning/xiangyushun-p-xiangyushun/luye/FastWAM/checkpoints/fastwam_release/robotwin_uncond_3cam_384.pt

wandb:
  enabled: true
  project: fast-wam
  name: robotwin_streaming_action_ft_2cam224_5e-5
  group: robotwin_streaming
  mode: offline
