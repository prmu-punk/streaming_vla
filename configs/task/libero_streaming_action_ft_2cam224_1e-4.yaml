# @package _global_

defaults:
  - override /data: libero_streaming_episode_2cam
  - override /model: fastwam_streaming
  - _self_

batch_size: 16
num_workers: 0
dataloader_disable_shared_memory: true
dataloader_pin_memory: false
dataloader_persistent_workers: false
dataloader_prefetch_factor: null

model:
  mot_checkpoint_mixed_attn: false
  streaming:
    freeze_video_expert: true
    proprio_to_action_only: true
    streaming_train:
      enabled: true
      mix_with_base_loss: false
      lambda_streaming_action: 1.0
      lambda_base: 1.0
      infer_num_inference_steps: 10
      distribution:
        0:
          - mode: full_prev
            prob: 1.0
        1:
          - mode: prev_to_cur
            prob: 1.0
            frontier_min: 8
            frontier_max: 26
        2:
          - mode: full_cur
            prob: 0.7
          - mode: prev_to_cur
            prob: 0.3
            frontier_min: 20
            frontier_max: 30
        3:
          - mode: full_cur
            prob: 1.0
        4:
          - mode: cur_to_next
            prob: 1.0
            frontier_min: 8
            frontier_max: 24
        5:
          - mode: full_next
            prob: 0.7
          - mode: cur_to_next
            prob: 0.3
            frontier_min: 20
            frontier_max: 30
        6:
          - mode: full_next
            prob: 1.0
        7:
          - mode: full_next
            prob: 0.7
          - mode: next_to_next2
            prob: 0.3
            frontier_min: 8
            frontier_max: 24
        8:
          - mode: next_to_next2
            prob: 1.0
            frontier_min: 20
            frontier_max: 30
        9:
          - mode: full_next2
            prob: 1.0

lr_scheduler_type: "cosine"
learning_rate: 1e-4
num_epochs: 10
max_steps: null
log_every: 10
save_every: 2000
eval_every: 200

gradient_accumulation_steps: 1
weight_decay: 1e-2
resume: null

wandb:
  enabled: true
  project: fast-wam
  name: libero_streaming_action_ft_2cam224_1e-4
  group: libero_streaming
  mode: offline

profile_bootstrap:
  target_obs_period_ms: 100.0
  action_trigger_every_n_obs: 2
  expected_video_prefill_ms: null
  expected_action_full_ms: null
  expected_action_step_ms: null
