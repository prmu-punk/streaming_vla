# @package data

train:
  _target_: fastwam.datasets.lerobot.streaming_episode_dataset.StreamingRobotEpisodeDataset
  dataset_dirs:
    - ./data/libero_mujoco3.3.2/libero_spatial_no_noops_lerobot
    - ./data/libero_mujoco3.3.2/libero_object_no_noops_lerobot
    - ./data/libero_mujoco3.3.2/libero_goal_no_noops_lerobot
    - ./data/libero_mujoco3.3.2/libero_10_no_noops_lerobot
  shape_meta:
    images:
      - key: image
        raw_shape: [3, 512, 512]
        shape: [3, 224, 224]
      - key: wrist_image
        raw_shape: [3, 512, 512]
        shape: [3, 224, 224]
    action:
      - key: default
        raw_shape: 7
        shape: 7
    state:
      - key: default
        raw_shape: 8
        shape: 8
  num_frames: 33
  global_sample_stride: 1
  action_video_freq_ratio: 4
  video_size: [224, 448]
  camera_key: null
  val_set_proportion: 0.0
  is_training_set: true
  skip_padding_as_possible: false
  concat_multi_camera: "horizontal"
  effective_obs_stride: 3
  history_obs: 1
  future_obs: 2
  trigger_every_n_obs: 3
  keep_trigger_phase: true
  action_horizon: 32
  episode_cache_size: 8
  processor:
    _target_: fastwam.datasets.lerobot.processors.fastwam_processor.FastWAMProcessor
    shape_meta: ${data.train.shape_meta}
    num_obs_steps: ${data.train.num_frames}
    num_output_cameras: 2
    action_output_dim: 7
    proprio_output_dim: 8
    delta_action_dim_mask:
      default: [true, true, true, true, true, true, false]
    action_state_transforms: null
    use_stepwise_action_norm: false
    norm_default_mode: min/max
    norm_exception_mode: null
    action_state_merger:
      _target_: fastwam.datasets.lerobot.transforms.action_state_merger.ConcatLeftAlign
    train_transforms:
      - _target_: fastwam.datasets.lerobot.transforms.image.ToTensor
      - _target_: torchvision.transforms.Resize
        size: [224, 224]
    val_transforms:
      - _target_: fastwam.datasets.lerobot.transforms.image.ToTensor
      - _target_: torchvision.transforms.Resize
        size: [224, 224]
  text_embedding_cache_dir: ./data/text_embeds_cache/libero
  context_len: 128
  pretrained_norm_stats: ./checkpoints/fastwam_release/libero_uncond_2cam224_dataset_stats.json

val: null
