model:
  vla_config_path: configs/vla_qwen3.yaml
  state_dim: 9
  fixed_action_tokens: 5
  num_frames: 4

dataset:
  zarr_path: data/libero/libero90_N500.zarr
  image_key: agentview_rgb
  action_key: action
  state_keys:
    - robot0_eef_pos
    - robot0_eef_quat
    - robot0_gripper_qpos
  chunk_horizon: null
  stride: null
  max_episodes: null
  val_ratio: 0.1

training:
  seed: 42
  num_epochs: 50
  max_grad_norm: 1.0
  max_train_steps: null

optimizer:
  lr: 1.0e-5
  beta1: 0.9
  beta2: 0.95
  weight_decay: 0.0

dataloader:
  batch_size: 1
  shuffle: true
  num_workers: 2
  pin_memory: true
  drop_last: false

val_dataloader:
  batch_size: 1
  shuffle: false
  num_workers: 2
  pin_memory: true
  drop_last: false

eval:
  max_val_steps: 200
  enable_rollout_eval: false
  rollout_every: 5
  rollout:
    task_name: libero90
    max_tasks: 5
    n_eval_per_task: 2
    seed_base: 1000
    image_size: 128
    camera_name: agentview
    max_episode_steps: 550
    enable_render: false
    temperature: 0.0

checkpoint:
  save_every: 5
  best_monitor: val/token_ce
  best_mode: min
