model:
  vla_config_path: configs/vla_qwen3.yaml
  state_dim: 16
  fixed_action_tokens: 8
  num_frames: 5
  max_context_len: 1024

dataset:
  zarr_path: /inspire/hdd/project/robot-reasoning/xiangyushun-p-xiangyushun/luye/streaming_vla/oat/data/libero/libero90_N4500.zarr
  image_key: agentview_rgb
  aux_image_key: robot0_eye_in_hand_rgb
  action_key: action
  prompt_key: prompt
  state_keys:
    - robot0_joint_pos
    - robot0_eef_pos
    - robot0_eef_quat
    - robot0_gripper_qpos
  chunk_horizon: null
  anchor_stride_steps: 8
  max_episodes: null
  val_ratio: 0.1

training:
  seed: 42
  num_epochs: 50
  max_grad_norm: 1.0
  source_dt_ms: 50
  step_dt_min_ms: 200
  step_dt_max_ms: 300
  max_train_batches: null

optimizer:
  lr: 5e-5
  beta1: 0.9
  beta2: 0.95
  weight_decay: 0.0

dataloader:
  batch_size: 6
  shuffle: true
  num_workers: 4
  pin_memory: true
  drop_last: false

val_dataloader:
  batch_size: 6
  shuffle: false
  num_workers: 4
  pin_memory: true
  drop_last: false

eval:
  max_val_batches: null

checkpoint:
  save_every: 1
  best_monitor: val/token_ce
  best_mode: min
  resume_from: null
