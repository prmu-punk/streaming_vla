model:
  vla_config_path: configs/vla_qwen3.yaml
  state_dim: 16
  fixed_action_tokens: 5
  num_frames: 3
dataset:
  zarr_path: oat/data/libero/libero90_N500.zarr
  image_key: agentview_rgb
  action_key: action
  prompt_key: prompt
  state_keys:
  - robot0_joint_pos
  - robot0_eef_pos
  - robot0_eef_quat
  - robot0_gripper_qpos
  context_steps: 8
  chunk_horizon: null
  anchor_stride_steps: null
  max_episodes: null
  val_ratio: 0.1
training:
  seed: 42
  num_epochs: 1
  max_grad_norm: 1.0
  source_dt_ms: 50
  step_dt_ms: 100
  max_train_batches: 10
optimizer:
  lr: 1.0e-05
  beta1: 0.9
  beta2: 0.95
  weight_decay: 0.0
dataloader:
  batch_size: 4
  shuffle: true
  num_workers: 2
  pin_memory: true
  drop_last: false
val_dataloader:
  batch_size: 4
  shuffle: false
  num_workers: 2
  pin_memory: true
  drop_last: false
eval:
  max_val_batches: 2
checkpoint:
  save_every: 5
  best_monitor: val/token_ce
  best_mode: min
